name: Job Hunter AI
run-name: Job Hunt - ${{ inputs.session_id || github.run_id }} - ${{ inputs.role || 'auto' }}

on:
  workflow_dispatch:
    inputs:
      role:
        description: 'Target job role'
        required: true
        default: 'Software Engineer'
      location:
        description: 'Location or Remote'
        default: 'Remote'
      limit:
        description: 'Max jobs to scan'
        default: '100'
      ats_threshold:
        description: 'Minimum ATS score (0-100)'
        default: '0'
      resume_b64:
        description: 'Base64-encoded resume (sent by Next.js UI)'
        required: false
      provider:
        description: 'AI Provider'
        required: false
      api_key:
        description: 'AI API Key'
        required: false
      openai_base_url:
        description: 'OpenAI Base URL'
        required: false
      boards:
        description: 'Job boards to scrape (comma-separated)'
        required: false
        default: 'linkedin,indeed,glassdoor,naukri,wellfound'
      redis_url:
        description: 'Upstash Redis URL'
        required: false
      redis_token:
        description: 'Upstash Redis Token'
        required: false
      session_id:
        description: 'Session ID'
        required: false
  schedule:
    - cron: '0 8 * * 1' # Every Monday at 08:00 UTC

permissions:
  contents: read
  actions: write

jobs:
  hunt:
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Install Playwright Browser
        run: python -m playwright install --with-deps chromium

      - name: Decode Resume
        run: |
          if [ -n "${{ inputs.resume_b64 }}" ]; then
            echo "${{ inputs.resume_b64 }}" | base64 --decode > resume_input.pdf
            echo "Resume decoded from workflow input"
          elif [ -n "${{ secrets.RESUME_B64 }}" ]; then
            echo "${{ secrets.RESUME_B64 }}" | base64 --decode > resume_input.pdf
            echo "Resume decoded from repository secret"
          elif [ -n "${{ inputs.session_id }}" ]; then
            echo "Resume will be fetched from Redis using session_id"
            touch resume_input.pdf # Placeholder for the script
          else
            echo "ERROR: No resume provided. Set RESUME_B64 secret or pass resume_b64 input or session_id."
            exit 1
          fi

      - name: Run Job Hunter
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY:      ${{ secrets.GROQ_API_KEY }}
          DEEPSEEK_API_KEY:  ${{ secrets.DEEPSEEK_API_KEY }}
          NVIDIA_API_KEY:    ${{ secrets.NVIDIA_API_KEY }}
          API_KEY_SECRET_SENTINEL: ${{ secrets.API_KEY_SECRET_SENTINEL }}
          SENDGRID_API_KEY:  ${{ secrets.SENDGRID_API_KEY }}
          NOTIFY_EMAIL:      ${{ secrets.NOTIFY_EMAIL }}
        run: |
          python job_hunter.py \
            --resume resume_input.pdf \
            --role "${{ inputs.role }}" \
            --location "${{ inputs.location }}" \
            --limit ${{ inputs.limit }} \
            --ats-threshold ${{ inputs.ats_threshold }} \
            --provider "${{ inputs.provider }}" \
            --api-key "${{ inputs.api_key }}" \
            --openai-base-url "${{ inputs.openai_base_url }}" \
            --boards "${{ inputs.boards }}" \
            --redis-url "${{ inputs.redis_url }}" \
            --redis-token "${{ inputs.redis_token }}" \
            --session-id "${{ inputs.session_id }}" \
            --output-dir output

      - name: Upload Excel Artifact
        uses: actions/upload-artifact@v4
        with:
          name: jobs-excel
          path: output/*.xlsx
          retention-days: 30

      - name: Upload JSON Summary
        uses: actions/upload-artifact@v4
        with:
          name: hunt-summary
          path: output/summary.json
          retention-days: 30

      - name: Generate GitHub Step Summary
        run: |
          if [ -f output/summary.json ]; then
            STATS=$(cat output/summary.json)
            echo "## Job Hunt Results" >> $GITHUB_STEP_SUMMARY
            echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Total jobs found | $(echo $STATS | jq -r .total_found) |" >> $GITHUB_STEP_SUMMARY
            echo "| Perfect matches  | $(echo $STATS | jq -r .perfect) |" >> $GITHUB_STEP_SUMMARY
            echo "| Should apply     | $(echo $STATS | jq -r .should_apply) |" >> $GITHUB_STEP_SUMMARY
            echo "| Not suitable     | $(echo $STATS | jq -r .not_suitable) |" >> $GITHUB_STEP_SUMMARY
            echo "| Top match        | $(echo $STATS | jq -r .top_match) |" >> $GITHUB_STEP_SUMMARY
            echo "| AI provider used | $(echo $STATS | jq -r .provider) |" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Cleanup
        if: always()
        run: rm -f resume_input.pdf
